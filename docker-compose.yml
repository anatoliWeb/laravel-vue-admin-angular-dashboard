services:
  backend:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: saas_backend
    working_dir: /var/www
    restart: unless-stopped
    volumes:
      - ./backend:/var/www
    command: sh /var/www/docker/entrypoint.sh
    env_file:
      - .env
    depends_on:
      - mysql
      - redis
    healthcheck:
      test: ["CMD-SHELL", "php -v >/dev/null 2>&1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  queue-worker:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: saas_queue_worker
    working_dir: /var/www
    restart: unless-stopped
    volumes:
      - ./backend:/var/www
      - ./docker/supervisor/supervisord.conf:/etc/supervisor/supervisord.conf
    command: sh /var/www/docker/queue/entrypoint.sh
    env_file:
      - .env
    depends_on:
      - backend
      - redis
      - mysql

  nginx:
    image: nginx:1.27-alpine
    container_name: saas_nginx
    restart: unless-stopped
    ports:
      - "${APP_PORT}:80"
    volumes:
      - ./backend:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - backend

  frontend:
    build:
      context: .
      dockerfile: docker/frontend/Dockerfile
    container_name: saas_frontend
    working_dir: /app
    restart: unless-stopped
    volumes:
      - ./frontend:/app
      - /app/node_modules
    env_file:
      - .env
    environment:
      - CHOKIDAR_USEPOLLING=true
    ports:
      - "${FRONT_PORT}:4200"
    command: >
      sh -c "
      mkdir -p src/assets &&
      printf '{\n  \"apiUrl\": \"http://localhost:%s/api\"\n}\n' \"$APP_PORT\" > src/assets/config.json &&
      echo Backend: http://localhost:$APP_PORT &&
      echo Frontend: http://localhost:$FRONT_PORT &&
      npm install && npm run start
      "
    depends_on:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://127.0.0.1:4200', (r) => process.exit(r.statusCode < 500 ? 0 : 1)).on('error', () => process.exit(1))\""]
      interval: 20s
      timeout: 5s
      retries: 8
      start_period: 40s

  mysql:
    image: mysql:8.0
    container_name: saas_mysql
    restart: unless-stopped
    env_file:
      - .env
    environment:
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    volumes:
      - ./docker/data/mysql:/var/lib/mysql
    ports:
      - "3307:3306"
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u$$MYSQL_USER -p$$MYSQL_PASSWORD --silent"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s

  redis:
    image: redis:7-alpine
    container_name: saas_redis
    restart: unless-stopped
    env_file:
      - .env
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - ./docker/data/redis:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$$REDIS_PASSWORD\" ping | grep PONG"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 10s
