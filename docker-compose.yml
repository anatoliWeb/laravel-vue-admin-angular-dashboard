version: "3.9"

services:
  backend:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: saas_backend
    working_dir: /var/www
    volumes:
      - ./backend:/var/www
    command: sh /var/www/docker/entrypoint.sh
    env_file:
      - .env
    depends_on:
      - mysql
      - redis

  queue-worker:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: saas_queue_worker
    working_dir: /var/www
    volumes:
      - ./backend:/var/www
      - ./docker/supervisor/supervisord.conf:/etc/supervisor/conf.d/supervisord.conf
    command: sh /var/www/docker/queue/entrypoint.sh
    env_file:
      - .env
    depends_on:
      - backend
      - redis

  nginx:
    image: nginx:1.27-alpine
    container_name: saas_nginx
    ports:
      - "${APP_PORT}:80"
    volumes:
      - ./backend:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - backend

  frontend:
    build:
      context: .
      dockerfile: docker/frontend/Dockerfile
    container_name: saas_frontend
    working_dir: /app
    volumes:
      - ./frontend:/app
      - /app/node_modules
    env_file:
      - .env
    environment:
      - CHOKIDAR_USEPOLLING=true
    ports:
      - "${FRONT_PORT}:4200"
    command: >
      sh -c "
      mkdir -p src/assets &&
      printf '{\n  \"apiUrl\": \"http://localhost:%s/api\"\n}\n' \"$APP_PORT\" > src/assets/config.json &&
      echo Backend: http://localhost:$APP_PORT &&
      echo Frontend: http://localhost:$FRONT_PORT &&
      npm install && npm run start
      "
    depends_on:
      - backend

  mysql:
    image: mysql:8.0
    container_name: saas_mysql
    restart: always
    env_file:
      - .env
    environment:
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    volumes:
      - ./docker/data/mysql:/var/lib/mysql
    ports:
      - "3307:3306"

  redis:
    image: redis:7-alpine
    container_name: saas_redis
    env_file:
      - .env
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - ./docker/data/redis:/data
    ports:
      - "6379:6379"

