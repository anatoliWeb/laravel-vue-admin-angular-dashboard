<div class="layout-shell">
  <aside class="sidebar">
    <div class="sidebar__brand">SaaS Admin</div>
    <nav class="sidebar__nav">
      <a routerLink="/" routerLinkActive="is-active" [routerLinkActiveOptions]="{ exact: true }">Dashboard</a>
      <a routerLink="/users" routerLinkActive="is-active">Users</a>
      <a routerLink="/settings" routerLinkActive="is-active">Settings</a>
    </nav>
  </aside>

  <section class="workspace">
    <header class="header">
      <h1 class="header__title">Portfolio SaaS</h1>
      <button class="header__user-menu" type="button">User Menu</button>
    </header>

    <main class="content">
      <router-outlet></router-outlet>
    </main>
  </section>
</div>
